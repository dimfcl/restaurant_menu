<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vesuvio</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="menu">

    <header>
      <h1>Vesuvio</h1>
      <p class="description">Fresh • Tasty • Homemade</p>
    </header>

    <hr>

    <main>

      <section class="starters">
        <h2>Starters</h2>
        <img src=../pictures/bread_icon.png alt="garlic bread">

        <article class="item">
          <p class="food">Garlic Bread</p><p class="price">4.50</p>
        </article>

        <article class="item">
          <p class="food">Bruschetta</p><p class="price">5.50</p>
        </article>
      </section>

      <section class="mains">
        <h2>Main Courses</h2>
        <img src=../pictures/pizza_icon.png alt="slice of pizza">

        <article class="item">
          <p class="food">Grilled Chicken</p><p class="price">12.00</p>
        </article>

        <article class="item">
          <p class="food">Spaghetti Carbonara</p><p class="price">10.50</p>
        </article>

        <article class="item">
          <p class="food">Margherita Pizza</p><p class="price">9.00</p>
        </article>
      </section>

      <section class="desserts">
        <h2>Desserts</h2>
        <img src=../pictures/cake_icon.png alt="chocolate cake">

        <article class="item">
          <p class="food">Chocolate Cake</p><p class="price">5.00</p>
        </article>

        <article class="item">
          <p class="food">Ice Cream</p><p class="price">3.50</p>
        </article>
      </section>

    </main>

    <hr>

    <footer>
      <p> Ioannina, Greece</p>
      <p> +30 123 456 789</p>
      <p><a href="https://example.com">Visit our website</a></p>
    </footer>

  </div>
</body>
</html>
